version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: will-dtf-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - will-dtf-network

  # Nginx reverse proxy (opcional)
  nginx:
    image: nginx:alpine
    container_name: will-dtf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - will-dtf-network

networks:
  will-dtf-network:
    driver: bridge
